  <g transform="translate(1010 740)">
    <rect width="250" height="96" fill="#ff7b5d"/>
    <text x="24" y="39" fill="#171915" font-family="monospace" font-size="14" letter-spacing="2">FILIPINO TALENT</text>
    <text x="24" y="70" fill="#171915" font-family="sans-serif" font-size="20" font-weight="700">Clear calls. Clean notes.</text>
  </g>
</svg>
