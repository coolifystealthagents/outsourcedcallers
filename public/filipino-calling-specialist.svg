<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Filipino calling specialist at a headset desk</title>
  <desc id="desc">Original editorial illustration of a Filipino calling specialist wearing a headset beside a call queue and CRM notes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263026"/>
      <stop offset="1" stop-color="#11130f"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9ff57"/>
      <stop offset="1" stop-color="#82aa35"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#fffdf7" stroke-opacity=".07"/>
    </pattern>
  </defs>
  <rect width="1400" height="1000" fill="url(#bg)"/>
  <rect width="1400" height="1000" fill="url(#grid)"/>
  <circle cx="1150" cy="110" r="300" fill="#c9ff57" opacity=".10"/>
  <path d="M0 765C270 690 480 745 730 705s430-16 670-95v390H0Z" fill="#0b0d0a"/>

  <g transform="translate(110 110)">
    <rect x="0" y="0" width="390" height="164" fill="#f4f0e7"/>
    <text x="34" y="45" fill="#687e36" font-family="monospace" font-size="19" letter-spacing="3">MANILA / SHIFT BRIEF</text>
    <path d="M34 84h78l17-29 23 58 20-42 21 23h163" fill="none" stroke="#171915" stroke-width="8"/>
    <circle cx="34" cy="84" r="9" fill="#ff7b5d"/>
    <circle cx="356" cy="94" r="9" fill="#647e29"/>
    <text x="34" y="140" fill="#565a52" font-family="sans-serif" font-size="20">Script approved · CRM ready</text>
  </g>

  <g transform="translate(895 300)">
    <rect width="390" height="360" fill="#f4f0e7"/>
    <text x="30" y="48" fill="#171915" font-family="monospace" font-size="17" letter-spacing="2">CALL QUEUE</text>
    <line x1="30" y1="70" x2="360" y2="70" stroke="#b8b4ab"/>
    <g font-family="sans-serif" font-size="19" fill="#565a52">
      <text x="30" y="120">Reached</text><text x="190" y="120" fill="#171915">Log outcome</text><circle cx="350" cy="113" r="8" fill="#45aa6f"/>
      <text x="30" y="180">No answer</text><text x="190" y="180" fill="#171915">Retry</text><circle cx="350" cy="173" r="8" fill="#e4a536"/>
      <text x="30" y="240">Approval</text><text x="190" y="240" fill="#171915">Ask owner</text><circle cx="350" cy="233" r="8" fill="#df6d56"/>
    </g>
    <line x1="30" y1="274" x2="360" y2="274" stroke="#d8d3c9"/>
    <text x="30" y="320" fill="#687e36" font-family="monospace" font-size="16">NOTE BEFORE NEXT DIAL</text>
  </g>

  <g transform="translate(320 205)">
    <path d="M185 360c-76 33-131 116-138 250l-12 216h655L651 605c-21-120-94-204-205-240Z" fill="url(#shirt)"/>
    <path d="M249 344c24 82 140 108 206 15l-15-91-179 4Z" fill="#bd704f"/>
    <ellipse cx="350" cy="205" rx="142" ry="165" fill="#c97a56"/>
    <path d="M217 215c-26-127 35-202 142-202 113 0 162 78 136 208-23-54-59-96-97-129-55 50-112 73-181 72Z" fill="#181b17"/>
    <path d="M212 177c-17 116 21 191 83 226-77-12-124-72-121-166 1-53 13-91 38-116Z" fill="#181b17"/>
    <path d="M490 170c28 111-9 202-86 237 88-10 132-83 124-181-4-47-15-81-38-113Z" fill="#181b17"/>
    <ellipse cx="299" cy="212" rx="10" ry="8" fill="#171915"/>
    <ellipse cx="409" cy="212" rx="10" ry="8" fill="#171915"/>
    <path d="M321 286c29 19 61 18 88-2" fill="none" stroke="#7a392f" stroke-width="9" stroke-linecap="round"/>
    <path d="M228 202c-7-92 40-145 123-145s139 54 139 145" fill="none" stroke="#f4f0e7" stroke-width="17"/>
    <rect x="202" y="187" width="32" height="85" rx="15" fill="#f4f0e7"/>
    <rect x="486" y="187" width="32" height="85" rx="15" fill="#f4f0e7"/>
    <path d="M503 259c0 78-34 113-103 113" fill="none" stroke="#f4f0e7" stroke-width="11" stroke-linecap="round"/>
    <circle cx="394" cy="372" r="13" fill="#ff7b5d"/>
    <path d="M74 826h614" stroke="#f4f0e7" stroke-opacity=".4" stroke-width="3"/>
